<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging in…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0e0e10;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container { max-width: 320px; padding: 24px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check-icon { display: none; margin: 0 auto 16px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 13px; color: #94a3b8; line-height: 1.5; }
    .error { color: #f87171; }
    .success h2 { color: #10b981; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <svg id="checkIcon" class="check-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <h2 id="title">Signing you in…</h2>
    <p id="message">Please wait while we complete the login.</p>
  </div>

  <script>
    // ─── PARSE PARAMETERS FROM URL ─────────────────────────
    // Supabase puts tokens in the hash fragment: #access_token=xxx&refresh_token=yyy
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');

    // Get query params: ?loginId=xxx&supabaseUrl=yyy&supabaseKey=zzz
    const searchParams = new URLSearchParams(window.location.search);
    const loginId = searchParams.get('loginId');
    const supabaseUrl = searchParams.get('supabaseUrl');
    const supabaseKey = searchParams.get('supabaseKey');

    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const spinnerEl = document.getElementById('spinner');
    const checkEl = document.getElementById('checkIcon');

    function showSuccess() {
      spinnerEl.style.display = 'none';
      checkEl.style.display = 'block';
      titleEl.textContent = 'Login Successful!';
      titleEl.style.color = '#10b981';
      messageEl.textContent = 'You can close this window and return to Framer.';
      setTimeout(() => { window.close(); }, 2000);
    }

    function showError(msg) {
      spinnerEl.style.display = 'none';
      titleEl.textContent = 'Login Failed';
      titleEl.style.color = '#f87171';
      messageEl.textContent = msg;
    }

    // ─── MAIN LOGIC ─────────────────────────────────────────
    async function handleCallback() {
      if (!accessToken || !refreshToken) {
        showError('No tokens found in the URL. Please try logging in again.');
        return;
      }
      if (!loginId) {
        showError('Missing login session ID. Please try logging in again.');
        return;
      }
      if (!supabaseUrl || !supabaseKey) {
        showError('Missing Supabase configuration. Please try logging in again.');
        return;
      }

      try {
        // Insert the tokens into the login_sessions table using the Supabase REST API
        const response = await fetch(`${supabaseUrl}/rest/v1/login_sessions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': supabaseKey,
            'Authorization': `Bearer ${supabaseKey}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            id: loginId,
            access_token: accessToken,
            refresh_token: refreshToken
          })
        });

        if (!response.ok) {
          const err = await response.text();
          throw new Error(`Database error: ${err}`);
        }

        showSuccess();
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      }
    }

    handleCallback();
  </script>
</body>
</html>
